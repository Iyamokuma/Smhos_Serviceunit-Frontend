# Netlify deploy: connect this repo (branch main). Set in Site → Environment variables:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# Optional: VITE_SUPABASE_FORM_SUBMIT_FN (default submit-registration)
# DB + Edge Functions run on Supabase (supabase db push + functions deploy), not Netlify.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
